name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo package -p nirs4all
      - uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: target/package/*.crate

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install build twine pyyaml
      - run: PYTHONPATH=bindings/python/src python -m unittest discover -s bindings/python/tests
      - run: python -m build bindings/python --outdir dist/python
      - run: python -m twine check dist/python/*
      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.python-version }}
          path: dist/python/*

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci --prefix bindings/wasm
      - run: npm test --prefix bindings/wasm
      - run: mkdir -p dist/npm && npm pack ./bindings/wasm --pack-destination dist/npm
      - uses: actions/upload-artifact@v7
        with:
          name: npm-wasm
          path: dist/npm/*

  strict-parity:
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: /tmp/nirs4all-core-r-library
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: GBeurier/nirs4all-methods
          ref: 6f6a3fa0dace421925502d4c8d5cab5102f56944
          path: nirs4all-methods
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          {
            echo "EMSDK=$EMSDK"
            echo "EMSDK_NODE=$EMSDK_NODE"
          } >> "$GITHUB_ENV"
          {
            echo "$EMSDK"
            echo "$EMSDK/upstream/emscripten"
          } >> "$GITHUB_PATH"
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-12 g++-12 ninja-build cmake r-base r-base-dev octave octave-dev
      - run: python -m pip install numpy scikit-learn pyyaml
      - run: npm ci --prefix bindings/wasm
      - run: cmake --preset emscripten
        working-directory: nirs4all-methods
      - run: cmake --build --preset emscripten --target pls4all_wasm --parallel
        working-directory: nirs4all-methods
      - run: npm ci
        working-directory: nirs4all-methods/bindings/js
      - run: npm run build && npm run stage:wasm
        working-directory: nirs4all-methods/bindings/js
      - run: NIRS4ALL_METHODS_JS_DIST="$GITHUB_WORKSPACE/nirs4all-methods/bindings/js/dist" NIRS4ALL_LITE_REQUIRE_METHODS_PARITY=1 npm test --prefix bindings/wasm
      - run: cmake --preset dev-release
        working-directory: nirs4all-methods
      - run: cmake --build --preset dev-release --target n4m_c --parallel
        working-directory: nirs4all-methods
      - run: octave --quiet --eval "cd bindings/matlab; build_mex"
        working-directory: nirs4all-methods
        env:
          PLS4ALL_INCLUDE_DIR: ${{ github.workspace }}/nirs4all-methods/cpp/include
          PLS4ALL_GENERATED_DIR: ${{ github.workspace }}/nirs4all-methods/build/dev-release/generated
          PLS4ALL_LIB_DIR: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
          LD_LIBRARY_PATH: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
      - run: make test-rust-parity
        env:
          NIRS4ALL_METHODS_LIB: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src/libn4m.so
          LD_LIBRARY_PATH: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
      - run: |
          PYTHONPATH="bindings/python/src:$GITHUB_WORKSPACE/nirs4all-methods/bindings/python/src" \
          PLS4ALL_LIB_PATH="$GITHUB_WORKSPACE/nirs4all-methods/build/dev-release/cpp/src/libn4m.so" \
          NIRS4ALL_LITE_REQUIRE_METHODS_PARITY=1 \
          python -m unittest bindings/python/tests/test_execution_parity.py -v
      - run: mkdir -p "$R_LIBS_USER"
      - run: Rscript -e 'install.packages(c("jsonlite", "yaml"), lib = Sys.getenv("R_LIBS_USER"), repos = "https://cloud.r-project.org")'
      - run: R CMD INSTALL --library="$R_LIBS_USER" --no-multiarch --no-staged-install nirs4all-methods/bindings/r/n4m
        env:
          PLS4ALL_LIB_DIR: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
          PLS4ALL_GENERATED_DIR: ${{ github.workspace }}/nirs4all-methods/build/dev-release/generated
          LD_LIBRARY_PATH: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
      - run: R CMD INSTALL --library="$R_LIBS_USER" bindings/r
      - run: make test-r-parity
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
      - run: make test-matlab-parity
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/nirs4all-methods/build/dev-release/cpp/src
          NIRS4ALL_METHODS_MATLAB_PATH: ${{ github.workspace }}/nirs4all-methods/bindings/matlab
          OCTAVE_PATH: ${{ github.workspace }}/nirs4all-methods/bindings/matlab

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript -e 'install.packages(c("jsonlite", "yaml"), repos = "https://cloud.r-project.org")'
      - run: mkdir -p dist/r
      - run: cd dist/r && R CMD build ../../bindings/r
      # The ecosystem bindings (nirs4allformats/io/datasets, n4m, dagmldata) are
      # Suggests served from R-universe (Additional_repositories), not installed
      # here. _R_CHECK_FORCE_SUGGESTS_=false makes their absence a NOTE rather
      # than an ERROR, exactly as CRAN does, and matching release-r.yml.
      - run: R CMD check --no-manual dist/r/nirs4all_*.tar.gz
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: r-source
          path: dist/r/nirs4all_*.tar.gz

  matlab-octave:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y octave zip
      - run: octave --quiet --eval "run('bindings/matlab/tests/smoke.m')"
      - run: scripts/build-matlab-package.sh dist/matlab
      - uses: actions/upload-artifact@v7
        with:
          name: matlab-octave
          path: dist/matlab/*
