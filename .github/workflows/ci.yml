name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo package -p nirs4all

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install build twine
      - run: PYTHONPATH=bindings/python/src python -m unittest discover -s bindings/python/tests
      - run: python -m build bindings/python --outdir dist/python
      - run: python -m twine check dist/python/*

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test --prefix bindings/wasm
      - run: mkdir -p dist/npm && npm pack ./bindings/wasm --pack-destination dist/npm

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: mkdir -p dist/r
      - run: R CMD build bindings/r --outdir=dist/r
      - run: R CMD check --no-manual dist/r/nirs4all_*.tar.gz

  matlab-octave:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y octave zip
      - run: octave --quiet --eval "run('bindings/matlab/tests/smoke.m')"
      - run: scripts/build-matlab-package.sh dist/matlab
