name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo package -p nirs4all
      - uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: target/package/*.crate

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install build twine pyyaml
      - run: PYTHONPATH=bindings/python/src python -m unittest discover -s bindings/python/tests
      - run: python -m build bindings/python --outdir dist/python
      - run: python -m twine check dist/python/*
      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.python-version }}
          path: dist/python/*

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci --prefix bindings/wasm
      - run: npm test --prefix bindings/wasm
      - run: mkdir -p dist/npm && npm pack ./bindings/wasm --pack-destination dist/npm
      - uses: actions/upload-artifact@v7
        with:
          name: npm-wasm
          path: dist/npm/*

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - run: mkdir -p dist/r
      - run: cd dist/r && R CMD build ../../bindings/r
      - run: R CMD check --no-manual dist/r/nirs4all_*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: r-source
          path: dist/r/nirs4all_*.tar.gz

  matlab-octave:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y octave zip
      - run: octave --quiet --eval "run('bindings/matlab/tests/smoke.m')"
      - run: scripts/build-matlab-package.sh dist/matlab
      - uses: actions/upload-artifact@v7
        with:
          name: matlab-octave
          path: dist/matlab/*
