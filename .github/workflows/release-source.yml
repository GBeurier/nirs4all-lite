# Source archive + SBOM + provenance + checksums for every release tag.
#
# Mirrors nirs4all-io / nirs4all-formats' release-source.yml: a reproducible
# git-archive source tarball + zip, a CycloneDX SBOM (syft), a SHA256SUMS
# manifest, and keyless Sigstore build-provenance attestations (actions/attest-*),
# all attached to the matching GitHub Release.
#
# Keyless attestation (OIDC, id-token: write) avoids any private-key custody.
#
# The artifact prefix is nirs4all-core-<version> (the aggregate name);
# version is read from the Rust-crate SoT (bindings/rust/nirs4all/Cargo.toml),
# kept in sync across bindings by scripts/bump_version.sh.
#
# Trigger: tag push v*.*.* (publish-to-Release gated on a non-pre-release tag),
# or workflow_dispatch for a dry run (build artifacts, no Release upload).
name: release-source

on:
  workflow_dispatch: {}
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # attach assets to the Release
  id-token: write       # keyless Sigstore provenance (OIDC)
  attestations: write   # actions/attest-* records

jobs:
  source-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # need the tag object for git archive
      - name: Resolve release publish guard
        id: release-guard
        run: |
          python3 scripts/release_guard.py \
            --github-repository "${GITHUB_REPOSITORY}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Resolve version + reproducible epoch
        id: meta
        run: |
          set -euo pipefail
          # Single source of truth: the Rust crate [package] version.
          # scripts/bump_version.sh keeps every binding manifest in sync with it.
          VER=$(sed -nE '/^\[package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p}' \
                bindings/rust/nirs4all/Cargo.toml | head -n1)
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"
          echo "prefix=nirs4all-core-$VER" >> "$GITHUB_OUTPUT"
          echo "resolved version: $VER"

      - name: Build reproducible source archives (tar.gz + zip)
        env:
          PREFIX: ${{ steps.meta.outputs.prefix }}
          TZ: UTC   # byte-reproducible zip regardless of runner timezone
        run: |
          mkdir -p dist
          git archive --format=tar --prefix="${PREFIX}/" HEAD -o dist/src.tar
          gzip -9 -n -c dist/src.tar > "dist/${PREFIX}-src.tar.gz"   # -n: no name/mtime in gzip header
          git archive --format=zip  --prefix="${PREFIX}/" HEAD -o "dist/${PREFIX}-src.zip"
          rm -f dist/src.tar
          ls -la dist/

      - name: Generate CycloneDX SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/${{ steps.meta.outputs.prefix }}.cdx.json
          upload-release-assets: false

      - name: SHA256SUMS
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance for the artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/${{ steps.meta.outputs.prefix }}-src.tar.gz
            dist/${{ steps.meta.outputs.prefix }}-src.zip
            dist/${{ steps.meta.outputs.prefix }}.cdx.json

      - name: Upload assets to the matching Release
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && steps.release-guard.outputs.allow_publish == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/${{ steps.meta.outputs.prefix }}-src.tar.gz
            dist/${{ steps.meta.outputs.prefix }}-src.zip
            dist/${{ steps.meta.outputs.prefix }}.cdx.json
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload artifacts (always, for dry runs / inspection)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-release-${{ steps.meta.outputs.ver }}
          path: dist/
