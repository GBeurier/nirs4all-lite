name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: r-lib/actions/setup-r@v2
      - run: sudo apt-get update && sudo apt-get install -y octave zip
      - run: python -m pip install build twine
      - run: cargo test --workspace
      - run: PYTHONPATH=bindings/python/src python -m unittest discover -s bindings/python/tests
      - run: npm test --prefix bindings/wasm
      - run: octave --quiet --eval "run('bindings/matlab/tests/smoke.m')"
      - run: make build-python build-npm build-r build-matlab package-rust
      - run: python -m twine check dist/python/*
      - run: R CMD check --no-manual dist/r/nirs4all_*.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/python/*
            dist/npm/*
            dist/r/*
            dist/matlab/*
