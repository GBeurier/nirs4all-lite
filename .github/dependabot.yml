version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust:
        patterns: ["*"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "pip"
    directory: "/bindings/python"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "npm"
    directory: "/bindings/wasm"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
